<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEALTH V5 | COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style id="dynamic-styles"></style>
    <style>
        /* ── Shell chrome ── */
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f8; color: #1a1a1a; }

        /* Top nav bar */
        #nav-container {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            background: #fff; border-bottom: 1px solid #e5e5e0;
            padding: 0 20px; height: 48px;
            display: flex; align-items: center; gap: 6px;
        }
        .nav-logo { font-weight: 900; color: #d97757; font-size: 0.85rem; letter-spacing: 2px; margin-right: 16px; white-space: nowrap; }
        #sys-status {
            margin-left: auto; font-size: 0.6rem; font-weight: 800;
            background: #eee; padding: 3px 10px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .nav-btn {
            background: none; border: none; padding: 6px 12px; cursor: pointer;
            font-size: 0.72rem; font-weight: 700; color: #888; text-transform: uppercase;
            letter-spacing: 0.5px; border-radius: 4px; font-family: inherit;
            transition: all 0.15s;
        }
        .nav-btn:hover { color: #1a1a1a; background: #f0f0ee; }
        .nav-btn.active { color: #d97757; background: rgba(217,119,87,0.1); }

        /* Content */
        #view-container { padding: 24px 28px; margin-top: 48px; max-width: 1440px; margin-left: auto; margin-right: auto; padding-top: 72px; }

        /* Debug console */
        #debug-console {
            background: #111; color: #00cc44; padding: 8px 14px;
            font-family: monospace; font-size: 10px; height: 52px;
            overflow-y: auto; position: fixed; bottom: 0; left: 0; right: 0;
            border-top: 1px solid #222; z-index: 100; line-height: 1.6;
        }
        #debug-console span.ts { color: #555; margin-right: 6px; }

        /* ── Config modal ── */
        #config-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #config-box {
            background: #fff; border-radius: 10px; padding: 36px;
            max-width: 440px; width: 90%;
        }
        #config-box h2 { margin: 0 0 4px; color: #d97757; font-size: 0.85rem; letter-spacing: 2px; }
        #config-box p { font-size: 0.75rem; color: #888; line-height: 1.6; margin: 0 0 20px; }
        .cfg-label { display: block; font-size: 0.62rem; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        #config-box input {
            width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 5px;
            margin-bottom: 12px; font-size: 0.82rem; font-family: inherit;
        }
        #config-box input:focus { outline: none; border-color: #d97757; }
        #cfg-submit {
            background: #d97757; color: #fff; border: none; padding: 11px; width: 100%;
            border-radius: 5px; cursor: pointer; font-weight: 800; font-size: 0.8rem;
            font-family: inherit; letter-spacing: 0.5px;
        }
        #cfg-submit:hover { background: #c4663f; }
        #cfg-error { font-size: 0.7rem; color: #b22222; margin-top: 8px; min-height: 16px; }
    </style>
</head>
<body>

<!-- ── Config modal ── -->
<div id="config-modal">
    <div id="config-box">
        <h2>STEALTH_V5 — VAULT ACCESS</h2>
        <p>Enter your 6-digit secure PIN to unlock the vault. This operates through a secure edge proxy.</p>
        <label class="cfg-label">6-Digit Access PIN</label>
        <input type="password" id="cfg-token" placeholder="------" maxlength="6" autocomplete="off" style="letter-spacing: 4px; text-align: center; font-size: 1.2rem;">
        <button id="cfg-submit" onclick="saveConfig()">UNLOCK VAULT</button>
        <div id="cfg-error"></div>
    </div>
</div>

<!-- ── Top nav ── -->
<div id="nav-container">
    <span class="nav-logo">STEALTH_V5</span>
    <div id="dynamic-menu"></div>
    <span id="sys-status">BOOTING...</span>
    <button onclick="resetConfig()" style="margin-left:8px; background:none; border:none; cursor:pointer; font-size:0.6rem; color:#bbb; font-family:inherit;">⚙ reconfigure</button>
</div>

<!-- ── Page content ── -->
<div id="view-container"></div>

<!-- ── Debug console ── -->
<div id="debug-console"></div>

<script>
// ── Globals ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'stealthv5_pin_v3';

// OWNER and REPO are fixed
window.OWNER = 'manujguptain';
window.REPO  = 'sys-patch-4802-lib';
window.TOKEN = localStorage.getItem(STORAGE_KEY) || '';
window.PROXY_URL = 'https://sys-patch-4802-lib-stealth-proxy.manujg.workers.dev';

// ── Debug logger ───────────────────────────────────────────────────────────
window.log = function(msg) {
    const d = document.getElementById('debug-console');
    const ts = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    d.innerHTML += `<br><span class="ts">[${ts}]</span> ${msg}`;
    d.scrollTop = d.scrollHeight;
};

// ── GitHub raw fetch via Proxy ─────────────────────────────────────────────
// Uses Accept: vnd.github.v3.raw — response body IS the file, no base64.
// isRaw=false (default) → JSON.parse the response
// isRaw=true  → return raw string (for HTML/CSS/text files)
window.fetchGit = async function(path, isRaw = false) {
    if (!window.TOKEN) { log(`!! No PIN — cannot fetch ${path}`); return null; }
    const cleanPath = path.split('?')[0];
    try {
        const res = await fetch(
            `${window.PROXY_URL}/repos/${window.OWNER}/${window.REPO}/contents/${cleanPath}`,
            { headers: { 'X-Sec-PIN': window.TOKEN, 'Accept': 'application/vnd.github.v3.raw' } }
        );
        if (!res.ok) { log(`!! Missing: ${cleanPath} (${res.status})`); return null; }
        return isRaw ? await res.text() : await res.json();
    } catch(e) {
        log(`!! Crash fetching ${cleanPath}: ${e.message}`);
        return null;
    }
};
window.fetchFromGit = window.fetchGit; // alias used by older components

// ── Script executor ────────────────────────────────────────────────────────
// innerHTML doesn't run <script> tags — we must replace each with a live element.
async function execScripts(container) {
    const scripts = Array.from(container.querySelectorAll('script'));
    for (const old of scripts) {
        const live = document.createElement('script');
        const src  = old.getAttribute('src');
        if (src) {
            const repoPath = src.startsWith('components/') ? `views/${src}` : src;
            const content = await window.fetchGit(repoPath, true);
            if (content) live.textContent = content;
            else log(`!! Could not load script: ${repoPath}`);
        } else {
            live.textContent = old.textContent;
        }
        old.replaceWith(live);
    }
}

// ── Page loader ────────────────────────────────────────────────────────────
let _activePage = null;
window.loadPage = async function(slug) {
    if (_activePage === slug) return;
    _activePage = slug;
    log(`Navigating → ${slug}`);

    // Highlight active nav button
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.slug === slug));

    document.getElementById('view-container').innerHTML =
        '<div style="padding:60px; text-align:center; color:#bbb; font-size:0.8rem;">Loading...</div>';

    const html = await window.fetchGit(`views/${slug}.html`, true);
    if (!html) {
        document.getElementById('view-container').innerHTML =
            `<div style="padding:24px;"><div class="card" style="color:#b22222; border-top:3px solid #b22222;">
             ⚠ Could not load <b>${slug}.html</b>. Check the file exists in the repo.
             </div></div>`;
        return;
    }

    document.getElementById('view-container').innerHTML = html;
    await execScripts(document.getElementById('view-container'));
};

// ── Nav builder ────────────────────────────────────────────────────────────
async function buildNav() {
    log('Loading navigation...');
    const css  = await window.fetchGit('views/theme.css', true);
    const menu = await window.fetchGit('views/menu.json');

    if (css)  document.getElementById('dynamic-styles').textContent = css;
    if (!menu) { log('!! Could not load menu.json'); return; }

    const menuEl = document.getElementById('dynamic-menu');
    menuEl.innerHTML = '';
    menu.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.dataset.slug = m.slug;
        btn.textContent = m.label;
        btn.addEventListener('click', () => {
            loadPage(m.slug);
            history.pushState(null, '', '#' + m.slug);
        });
        menuEl.appendChild(btn);
    });

    document.getElementById('sys-status').textContent = 'LIVE';

    const hash = window.location.hash.slice(1);
    const target = menu.find(m => m.slug === hash) ? hash : menu[0].slug;
    loadPage(target);
}

window.addEventListener('popstate', () => {
    const slug = window.location.hash.slice(1);
    if (slug) loadPage(slug);
});

// ── Config management ──────────────────────────────────────────────────────
async function saveConfig() {
    const token = document.getElementById('cfg-token').value.trim();
    const errEl = document.getElementById('cfg-error');
    const btn   = document.getElementById('cfg-submit');

    if (!token) { errEl.textContent = 'Token is required.'; return; }

    btn.textContent = 'Verifying...';
    btn.disabled = true;
    errEl.textContent = '';

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        let testRes;
        try {
            testRes = await fetch(
                `${window.PROXY_URL}/repos/${window.OWNER}/${window.REPO}/contents/views/menu.json`,
                { headers: { 'X-Sec-PIN': token, 'Accept': 'application/vnd.github.v3.raw' }, signal: controller.signal }
            );
        } finally {
            clearTimeout(timeout);
        }

        if (!testRes.ok) {
            if (testRes.status === 401) {
                errEl.textContent = '⚠ Invalid PIN.';
            } else if (testRes.status === 403) {
                errEl.textContent = '⚠ Token in proxy lacks permission. Check the proxy GITHUB_PAT.';
            } else if (testRes.status === 404) {
                errEl.textContent = '⚠ Repo not found. Check your proxy token has access to manujguptain/sys-patch-4802-lib.';
            } else {
                errEl.textContent = `⚠ Access denied (HTTP ${testRes.status}). Check your proxy config.`;
            }
            btn.textContent = 'UNLOCK VAULT';
            btn.disabled = false;
            return;
        }

        localStorage.setItem(STORAGE_KEY, token);
        window.TOKEN = token;
        document.getElementById('config-modal').style.display = 'none';
        buildNav();
    } catch(e) {
        if (e.name === 'AbortError') {
            errEl.textContent = '⚠ Request timed out. Check your network connection and try again.';
        } else {
            errEl.textContent = `⚠ Network error: ${e.message}`;
        }
        btn.textContent = 'UNLOCK VAULT';
        btn.disabled = false;
    }
}

function resetConfig() {
    if (confirm('Clear your access token?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
}

// ── Boot ───────────────────────────────────────────────────────────────────
log('Stealth V5 booting...');
if (window.TOKEN) {
    document.getElementById('config-modal').style.display = 'none';
    buildNav();
} else {
    document.getElementById('config-modal').style.display = 'flex';
}
</script>
</body>
</html>
